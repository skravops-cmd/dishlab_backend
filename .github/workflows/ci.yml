name: CI Pipeline

on:
  push:
    branches:
      - master
      - stage
      - feature/**
  pull_request:
    branches:
      - master
      - stage
      - feature/**

permissions:
  contents: read
  id-token: write   # required for Azure OIDC

jobs:
  # -------------------------------------------------
  # LINT
  # -------------------------------------------------
  lint:
    name: Lint (Super-Linter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          VALIDATE_PYTHON: true
          VALIDATE_YAML: true
          VALIDATE_DOCKERFILE: true
          VALIDATE_BASH: true
          VALIDATE_GITHUB_ACTIONS: true

          PYTHON_VERSION: 3.11
          PYTHON_FLAKE8_CONFIG_FILE: .flake8
          DEFAULT_BRANCH: master
          USE_GIT_DIFF: false

  # -------------------------------------------------
  # TESTS
  # -------------------------------------------------
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v

  # -------------------------------------------------
  # DEPLOY (STAGE)
  # -------------------------------------------------
  deploy-stage:
    name: Deploy to Azure (Stage)
    runs-on: ubuntu-latest
    needs: tests
    environment: stage

    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stage')

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push Docker Image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/dishlab-api:stage
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Update Azure App Service
        run: |
          az webapp config container set \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.ACR_NAME }}.azurecr.io/dishlab-api:stage \
            --docker-registry-server-url https://${{ secrets.ACR_NAME }}.azurecr.io
