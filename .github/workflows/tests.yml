name: Unit Tests

on:
  pull_request:
    branches: [ "feature/unit-test-layout" ]
  push:
    branches: [  "feature/unit-test-layout" ]

jobs:
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest -v
        env:
          PYTHONPATH: ${{ github.workspace }}
